name: CI

on:
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/app/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npm run test

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/app
    services:
      db:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aerispay
          MYSQL_USER: aerispay
          MYSQL_PASSWORD: aerispay
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s
    env:
      DATABASE_URL: mysql://aerispay:aerispay@localhost:3306/aerispay
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-test-secret
      AUTH_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/app/package-lock.json

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npx prisma db seed

      - run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Cypress
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: http://localhost:3000
