# Développement local — MySQL + phpMyAdmin + application Next.js (`app`).
#
# Prérequis : projet Next.js initialisé dans `web/app` (`package.json`, Prisma, etc.).
#
# Usage :
#   docker compose up -d
#
# Le projet Next.js vit sous `web/app`; le montage par défaut le rend disponible dans
# le conteneur à `/app`. Définir APP_BIND pour surcharger ce chemin si besoin.

#   → app : http://localhost:3000 (ou APP_PORT) — `DATABASE_URL` pointe vers le service `db`
#
# Variables : copier `web/development.env.example` vers `.env`
# pour NEXTAUTH_SECRET, NEXTAUTH_URL, APP_BIND si besoin. Les identifiants MySQL servent aussi à l’`app`.

services:
  traefik:
    image: traefik:v2.11
    container_name: aerispay-traefik-dev
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  db:
    image: mysql:8.4
    container_name: aerispay-mysql-dev
    restart: unless-stopped
    environment:
      # Dev : défaut `root` (identique à phpMyAdmin / Prisma shadow) — **changer en prod**
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aerispay}
      MYSQL_USER: ${MYSQL_USER:-aerispay}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aerispay}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Interface web : http://localhost:${PHPMYADMIN_PORT:-8080}/  (pas de chemin /dashboard)
  phpmyadmin:
    image: phpmyadmin:5
    container_name: aerispay-phpmyadmin-dev
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      # Accès par défaut : utilisateur `root` / mot de passe = `MYSQL_ROOT_PASSWORD` (défaut `root` en dev)
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`pma.aerispay.localhost`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=web"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
    depends_on:
      db:
        condition: service_healthy

  # MinIO — stockage objet S3-compatible (images produits, sauvegardes…)
  # Console : http://minio.aerispay.localhost/  (login: minioadmin / minioadmin)
  # API S3  : http://s3.aerispay.localhost/     (endpoint pour le SDK)
  minio:
    image: minio/minio:latest
    container_name: aerispay-minio-dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_dev:/data
    labels:
      - "traefik.enable=true"
      # Console UI
      - "traefik.http.routers.minio-console.rule=Host(`minio.aerispay.localhost`)"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
      # S3 API
      - "traefik.http.routers.minio-api.rule=Host(`s3.aerispay.localhost`)"
      - "traefik.http.routers.minio-api.entrypoints=web"
      - "traefik.http.routers.minio-api.service=minio-api"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Crée automatiquement le bucket par défaut au démarrage
  minio-init:
    image: minio/mc:latest
    container_name: aerispay-minio-init-dev
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/$${S3_BUCKET:-aerispay} &&
        mc anonymous set download local/$${S3_BUCKET:-aerispay}/public &&
        echo 'Bucket ready'
      "
    restart: "no"

  app:
    image: node:20-bookworm-slim
    container_name: aerispay-app-dev
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3001:3001"   # e2e test server (base aerispay_test)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`aerispay.localhost`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
    environment:
      NODE_ENV: development
      # MySQL via le réseau Compose (hostname `db`, pas `localhost`)
      DATABASE_URL: mysql://${MYSQL_USER:-aerispay}:${MYSQL_PASSWORD:-aerispay}@db:3306/${MYSQL_DATABASE:-aerispay}
      # Prisma `migrate dev` (shadow) : root + base **explicite** (pas d’URL sans chemin,
      # sinon MySQL peut se connecter à la base système `mysql` → P3004)
      SHADOW_DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-root}@db:3306/${MYSQL_DATABASE:-aerispay}
      # URL vue par le navigateur (hôte) — cookies / NextAuth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://aerispay.localhost}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-devsecret-change-me}
      # NextAuth v5 lit souvent AUTH_SECRET — même valeur que ci-dessus
      AUTH_SECRET: ${NEXTAUTH_SECRET:-devsecret-change-me}
      # MinIO / S3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-aerispay}
      S3_REGION: ${S3_REGION:-us-east-1}
      # URL publique des fichiers (via Traefik)
      S3_PUBLIC_URL: http://s3.aerispay.localhost/${S3_BUCKET:-aerispay}
      # Aide le file watching sur Docker Desktop (macOS / Windows)
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ${APP_BIND:-./web/app}:/app
      - app_node_modules:/app/node_modules
    command: >
      sh -c "apt-get update -y && apt-get install -y openssl procps && npm install && if [ -f prisma/schema.prisma ]; then npx prisma generate; fi && exec npm run dev -- -H 0.0.0.0 -p 3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data_dev:
    name: aerispay_mysql_data_dev
  app_node_modules:
    name: aerispay_app_node_modules_dev
  minio_data_dev:
    name: aerispay_minio_data_dev

networks:
  default:
    name: aerispay_dev
